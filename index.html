<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Incubator monitoring For visitors</title>
    <style>
        /* التصميم المظلم والطبي */
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* الشريط العلوي */
        .top-bar {
            background-color: #1e293b;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #00f2fe;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .top-bar h2 {
            margin: 0;
            font-size: 22px;
            color: #e2e8f0;
        }

        .login-btn {
            background-color: #334155;
            color: #00f2fe;
            border: 1px solid #00f2fe;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }

        .login-btn:hover {
            background-color: #00f2fe;
            color: #0f172a;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        /* حاوية الكروت */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 50px 20px;
        }

        /* تصميم كروت البيانات */
        .card {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 15px;
            width: 260px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid #334155;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            color: #94a3b8;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .value {
            font-size: 45px;
            font-weight: bold;
            color: #00f2fe;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }

        .status-badge {
            display: inline-block;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: bold;
            background-color: #475569; /* لون افتراضي قبل التحميل */
            color: white;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <h2>👶 Incubator Monitoring (Read Only )</h2>
        <button class="login-btn" onclick="window.location.href='login.html'">Manager Login 🔒</button>
    </div>

    <div class="container">
        <div class="card">
            <h3>Temperature  🌡️</h3>
            <div class="value" id="temp-val">-- °C</div>
        </div>
        
        <div class="card">
            <h3>Humidity 💧</h3>
            <div class="value" id="hum-val">-- %</div>
        </div>
        
        <div class="card">
            <h3>Bed State 🛏️</h3>
            <div class="status-badge" id="status-val">جاري الاتصال...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // إعدادات قاعدة البيانات الخاصة بك
        const firebaseConfig = {
            databaseURL: "https://realtimedatabase-9952b-default-rtdb.firebaseio.com/" 
        };
        
        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // قراءة البيانات لحظياً من مسار /Incubator/Current
        db.ref("/Incubator/Current").on("value", (snapshot) => {
            const data = snapshot.val();
            
            if(data) {
                // تحديث الأرقام
                document.getElementById("temp-val").innerText = data.Temp + " °C";
                document.getElementById("hum-val").innerText = data.Hum + " %";
                
                // تحديث حالة السرير وتغيير اللون
                let statusEl = document.getElementById("status-val");
                if(data.Status === "BUSY") {
                    statusEl.innerText = "Child Exist";
                    statusEl.style.backgroundColor = "#10b981"; // لون أخضر مريح
                    statusEl.style.boxShadow = "0 0 15px rgba(16, 185, 129, 0.4)";
                } else {
                    statusEl.innerText = "The Bed is Empty";
                    statusEl.style.backgroundColor = "#ef4444"; // لون أحمر تنبيهي
                    statusEl.style.boxShadow = "0 0 15px rgba(239, 68, 68, 0.4)";
                }
            }
        });
    </script>
</body>
</html>
