<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الطبيب | الحاضنة الذكية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        /* تصميم الكارتات */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #ecf0f1; padding: 15px; border-radius: 10px; border-right: 5px solid #3498db; }
        .card h3 { margin: 0; font-size: 14px; color: #7f8c8d; }
        .card p { font-size: 24px; font-weight: bold; margin: 10px 0; color: #2c3e50; }

        /* لوحة التحكم بالأجهزة */
        .controls { margin-top: 30px; padding: 20px; background: #f9f9f9; border-radius: 10px; border: 1px solid #ddd; }
        .control-group { margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        input[type="range"] { width: 60%; }
        
        /* جدول الأرشيف */
        .history-section { margin-top: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #3498db; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .status-tag { background: #27ae60; color: white; padding: 2px 8px; border-radius: 5px; font-size: 12px; }
        
        .logout-btn { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; float: left; }
    </style>
</head>
<body>

<div class="container">
    <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
    <h2>لوحة تحكم الطبيب (Edge Computing Dashboard)</h2>

    <div class="grid">
        <div class="card">
            <h3>درجة الحرارة الحالية</h3>
            <p id="temp">-- °C</p>
        </div>
        <div class="card">
            <h3>الرطوبة</h3>
            <p id="hum">-- %</p>
        </div>
        <div class="card">
            <h3>حالة السرير</h3>
            <p id="status">جاري الفحص...</p>
        </div>
    </div>

    <div class="controls">
        <h3>التحكم بالإعدادات (Remote Settings)</h3>
        <div class="control-group">
            <label>الحرارة المطلوبة (Target): <span id="targetVal">37</span>°C</label>
            <input type="range" id="tempSlider" min="30" max="40" step="0.5" oninput="updateTemp(this.value)">
        </div>
        <div class="control-group">
            <label>شدة الإضاءة: <span id="ledVal">50</span>%</label>
            <input type="range" id="ledSlider" min="0" max="100" oninput="updateLED(this.value)">
        </div>
    </div>

    <div class="history-section">
        <h3>سجل البيانات المرفوعة من الذاكرة (Offline History)</h3>
        <table>
            <thead>
                <tr>
                    <th>البيانات المسترجعة (Raw Logs)</th>
                    <th>حالة المزامنة</th>
                </tr>
            </thead>
            <tbody id="historyTableBody">
                <tr><td colspan="2">جاري تحميل السجلات...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 1. إعدادات Firebase (استبدلها بمعلومات مشروعك)
    const firebaseConfig = {
        apiKey: "AIzaSy...",
        databaseURL: "https://your-project-id.firebaseio.com",
        projectId: "your-project-id",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. دالة جلب القراءات اللحظية (Current Data)
    db.ref('Incubator/Current').on('value', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            document.getElementById('temp').innerText = data.temperature + " °C";
            document.getElementById('hum').innerText = data.humidity + " %";
            document.getElementById('status').innerText = data.status;
        }
    });

    // 3. دالة التحكم (إرسال الأوامر للقطعة)
    function updateTemp(val) {
        document.getElementById('targetVal').innerText = val;
        db.ref('Incubator/Settings').update({ targetTemp: parseFloat(val) });
    }

    function updateLED(val) {
        document.getElementById('ledVal').innerText = val;
        db.ref('Incubator/Settings').update({ ledBrightness: parseInt(val) });
    }

    // 4. الدالة الجديدة: عرض الأرشيف (Offline Records)
    function loadOfflineHistory() {
        const historyRef = db.ref('Incubator/History/OfflineRecords');
        const tableBody = document.getElementById('historyTableBody');

        historyRef.on('value', (snapshot) => {
            tableBody.innerHTML = ''; 
            if (snapshot.exists()) {
                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    const row = `
                        <tr>
                            <td style="text-align:right; font-family:monospace;">${data}</td>
                            <td><span class="status-tag">تمت المزامنة 🔄</span></td>
                        </tr>`;
                    tableBody.innerHTML += row;
                });
            } else {
                tableBody.innerHTML = '<tr><td colspan="2">لا توجد سجلات أوفلاين مخزنة حالياً.</td></tr>';
            }
        });
    }

    // 5. حماية الصفحة وتسجيل الخروج
    function logout() {
        sessionStorage.clear();
        window.location.href = "login.html";
    }

    // تشغيل الدوال عند الفتح
    window.onload = function() {
        // فحص الدخول (اختياري)
        if(!sessionStorage.getItem("loggedIn")) {
            // window.location.href = "login.html"; 
        }
        loadOfflineHistory();
    };
</script>

</body>
</html>
